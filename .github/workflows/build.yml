name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: flutter pub get
      - name: Backup custom main.dart
        run: cp lib/main.dart lib/main.dart.bak
      - name: Create Android project files
        run: flutter create --platforms android --project-name sd_vpn .
      - name: Restore custom main.dart
        run: mv lib/main.dart.bak lib/main.dart
      - name: Replace android/app/build.gradle with clean config
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.example.sd_vpn"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF
      - name: Inject Firebase google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Inject Groq API key
        run: |
          echo "OPENAI_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

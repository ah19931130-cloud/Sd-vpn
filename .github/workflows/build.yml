name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: flutter pub get
      - name: Backup custom main.dart
        run: cp lib/main.dart lib/main.dart.bak
      - name: Create Android project files
        run: flutter create --platforms android --project-name sd_vpn .
      - name: Restore custom main.dart
        run: mv lib/main.dart.bak lib/main.dart
      - name: Set compileSdk and minSdk for flutter_sound compatibility
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          cat >> android/build.gradle << 'EOF'
          ext {
              flutter = [
                  compileSdkVersion: 35,
                  minSdkVersion    : 24,
                  targetSdkVersion : 35
              ]
          }
          EOF
      - name: Inject Firebase google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Inject Groq API key
        run: |
          echo "OPENAI_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

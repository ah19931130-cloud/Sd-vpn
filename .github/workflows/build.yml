name: Build Android APK

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: zulu
      java-version: '17'

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.24.0'

  - name: Install dependencies
    run: flutter pub get

  - name: Backup custom main.dart
    run: cp lib/main.dart lib/main.dart.bak

  - name: Create Android project
    run: flutter create --platforms android --project-name sd_vpn .

  - name: Restore custom main.dart
    run: mv lib/main.dart.bak lib/main.dart

  - name: Inject Firebase google-services.json
    run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

  - name: Inject API Key
    run: echo "OPENAI_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

  - name: Build APK
    run: flutter build apk --debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: debug-apk
      path: build/app/outputs/flutter-apk/app-debug.apk
